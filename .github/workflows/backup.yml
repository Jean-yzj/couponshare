name: Daily DB backup to R2

# Triggers the app's server-side backup endpoint, which streams the full DB
# directly into R2 (backups/db-YYYY-MM-DD.ndjson.gz). The server stages to a
# .tmp key and only promotes dumps that end with the _done marker, so an
# object at the final key is a verified-complete backup.
#
# This replaced the old download-and-reupload pipeline (fetch-backup.mjs →
# aws s3 cp), which pulled ~500MB through the gateway every night and had been
# failing. The verify step polls the same endpoint until it answers
# skipped:true — i.e. today's object exists — so a silent server-side failure
# still turns this workflow red.
#
# Required repo secret: CRON_SECRET — same value as the app's CRON_SECRET env.
# (BACKUP_SECRET and the R2_* secrets are no longer used by this workflow.)

on:
  schedule:
    - cron: "0 18 * * *" # 02:00 Asia/Taipei daily
  workflow_dispatch: {}

concurrency:
  group: db-backup
  cancel-in-progress: false

# Least privilege: no repo access needed at all — this job only calls the app.
permissions: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Trigger server-side backup
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          code=$(curl -s -o resp.json -w "%{http_code}" -m 30 \
            -H "x-cron-secret: $CRON_SECRET" \
            https://couponshare.lazybearlife.com/api/v1/cron/backup)
          cat resp.json; echo
          # 202 = started, 200 = already done today (skipped), 409 = already running
          case "$code" in
            200|202|409) ;;
            *) echo "unexpected status $code"; exit 1 ;;
          esac

      - name: Verify today's backup exists in R2
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          # A non-skipped 200/202 here also retries a failed run — the endpoint
          # is idempotent per day, so re-hitting it is safe.
          for i in $(seq 1 40); do
            sleep 60
            code=$(curl -s -o resp.json -w "%{http_code}" -m 30 \
              -H "x-cron-secret: $CRON_SECRET" \
              https://couponshare.lazybearlife.com/api/v1/cron/backup) || continue
            if [ "$code" = "200" ] && grep -q '"skipped":true' resp.json; then
              echo "backup verified: $(cat resp.json)"
              exit 0
            fi
            echo "attempt $i: status $code $(cat resp.json)"
          done
          echo "backup did not appear within 40 minutes"
          exit 1
