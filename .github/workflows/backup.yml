name: Daily DB backup to R2

# Pulls the full DB from the app's streaming backup endpoint and stores it
# off-site in Cloudflare R2. Runs daily; also runnable on demand to test.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   BACKUP_SECRET         same value as the app's BACKUP_SECRET env var
#   R2_ACCOUNT_ID         Cloudflare account id (the R2 S3 endpoint subdomain)
#   R2_BUCKET             R2 bucket name (e.g. couponshare-backups)
#   R2_ACCESS_KEY_ID      R2 API token access key
#   R2_SECRET_ACCESS_KEY  R2 API token secret key
# Set a 30-day lifecycle/expiry rule on the bucket to prune old backups.

on:
  schedule:
    - cron: "0 18 * * *" # 02:00 Asia/Taipei daily
  workflow_dispatch: {}

concurrency:
  group: db-backup
  cancel-in-progress: false

# Least privilege: this job only reads the repo (to run the fetch script) and talks
# to external endpoints. It never writes back to the repository.
permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout (for the resumable backup script)
        # Pinned to a full commit SHA (supply-chain safety); this is the v4 tag as
        # of 2026-07-06. Bump deliberately when upgrading.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download backup from app (resumable)
        env:
          BACKUP_URL: https://couponshare.lazybearlife.com
          BACKUP_SECRET: ${{ secrets.BACKUP_SECRET }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y%m%d-%H%M)
          echo "TS=$TS" >> "$GITHUB_ENV"
          # Resumable: loops the endpoint's ~40MB slices until _done, so the full
          # ~486MB DB survives Zeabur's ~10-min gateway timeout (one curl truncates).
          OUT="couponshare-$TS.ndjson.gz" node scripts/fetch-backup.mjs
          gzip -t "couponshare-$TS.ndjson.gz"
          ls -lh "couponshare-$TS.ndjson.gz"

      - name: Upload to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
        run: |
          set -euo pipefail
          aws s3 cp "couponshare-${TS}.ndjson.gz" \
            "s3://${{ secrets.R2_BUCKET }}/couponshare/couponshare-${TS}.ndjson.gz" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          echo "✓ uploaded couponshare-${TS}.ndjson.gz to R2 bucket ${{ secrets.R2_BUCKET }}"
