name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          # Build does not connect to the DB; these are only to satisfy env reads.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          SESSION_SECRET: ci-dummy-secret
          BARCODE_KEY: ci-dummy-barcode-key
